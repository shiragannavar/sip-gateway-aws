##
## SIP Gateway — Kamailio Configuration
##
## Minimal stateful SIP proxy that relays INVITEs from the ElevenLabs SIP
## server to the telephony provider's SBC, with RTPEngine anchoring all media through this host.
##
## Auth: Digest authentication on INVITEs (407 challenge).
## The outbound trunk's authUsername/authPassword must match.
##
## Placeholders (substituted by entrypoint.sh):
##   __EXTERNAL_IP__             — this host's public IP
##   __CUSTOMER_SBC_ADDRESS__    — telephony provider SBC IP or FQDN (inbound INVITEs from here → ElevenLabs)
##   __CUSTOMER_SBC_PORT__       — telephony provider SBC SIP port (outbound leg toward SBC)
##   __ELEVENLABS_SIP_HOST__     — ElevenLabs SIP host (inbound → TCP to here)
##   __ELEVENLABS_SIP_PORT__     — ElevenLabs SIP port (usually 5060)
##   __AUTH_USER__               — digest auth username
##   __AUTH_PASSWORD__           — digest auth password
##   __AUTH_REALM__              — digest auth realm (defaults to EXTERNAL_IP)
##

#!KAMAILIO

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0

fork=yes
children=4

listen=udp:0.0.0.0:5060 advertise __EXTERNAL_IP__:5060
listen=tcp:0.0.0.0:5060 advertise __EXTERNAL_IP__:5060

tcp_connection_lifetime=3605
tcp_max_connections=2048

auto_aliases=no
dns=yes
rev_dns=no
dns_try_ipv6=no
dns_cache_init=on
use_dns_cache=on
dns_cache_flags=0

server_header="Server: ElevenLabs-SIP-GW"
user_agent_header="User-Agent: ElevenLabs-SIP-GW"

####### Modules Section ########

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "sdpops.so"
loadmodule "auth.so"

# -- tm params --
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("tm", "restart_fr_on_each_reply", 1)
modparam("tm", "auto_inv_100_reason", "Trying")

# -- rr params --
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# -- rtpengine params --
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")
modparam("rtpengine", "rtpengine_tout_ms", 5000)

# -- nathelper --
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# -- auth params --
modparam("auth", "nonce_expire", 300)
modparam("auth", "nonce_count", 1)

####### Routing Logic ########

request_route {
    xlog("L_INFO", "[$ci] $rm from $fu to $ru (src $si:$sp)\n");

    $avp(zd_ticket) = $null;
    if (is_present_hf("X-Zendesk-Ticket-Id")) {
        $avp(zd_ticket) = $hdr(X-Zendesk-Ticket-Id);
    }

    if (is_method("REFER")) {
        xlog("L_INFO", "[$ci] REFER detail r-uri=$ru Refer-To=[$hdr(Refer-To)] Referred-By=[$hdr(Referred-By)]\n");
        xlog("L_INFO", "[$ci] REFER X-Zendesk-Ticket-Id=[$hdr(X-Zendesk-Ticket-Id)]\n");
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "[$ci] Malformed SIP message from $si:$sp\n");
        exit;
    }

    force_rport();

    if (is_method("OPTIONS") && uri == myself) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    if (has_totag()) {
        if (loose_route()) {
            if (is_method("INVITE|UPDATE")) {
                route(RTPMANAGE);
            } else if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RTPMANAGE);
                }
            } else if (is_method("BYE")) {
                rtpengine_delete();
            }
            route(RELAY);
            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                route(RELAY);
                exit;
            } else {
                exit;
            }
        }

        sl_send_reply("404", "Not Found");
        exit;
    }

    # ---- Initial requests (no to-tag) ----

    if (is_method("INVITE")) {
        # Inbound from customer SBC → ElevenLabs (TCP). Skip digest (caller is the SBC).
        if ($si == "__CUSTOMER_SBC_ADDRESS__") {
            record_route();
            route(RTPMANAGE);
            if ($ru =~ ";") {
                $var(el_uri_suffix) = $(ru{re.subst,/^[^;]+//});
            } else {
                $var(el_uri_suffix) = "";
            }
            $ru = "sip:" + $rU + "@__ELEVENLABS_SIP_HOST__:__ELEVENLABS_SIP_PORT__;transport=tcp" + $var(el_uri_suffix);
            xlog("L_INFO", "[$ci] Inbound from SBC: routing INVITE to ElevenLabs $ru\n");
            t_on_failure("INVITE_FAILURE");
            t_on_reply("MANAGE_REPLY");
            route(RELAY);
            exit;
        }

        # Outbound from ElevenLabs → customer SBC
        #!ifdef WITH_AUTH
        route(AUTH);
        #!endif

        record_route();

        route(RTPMANAGE);

        $ru = "sip:" + $rU + "@__CUSTOMER_SBC_ADDRESS__:__CUSTOMER_SBC_PORT__";

        xlog("L_INFO", "[$ci] Routing INVITE to SBC $ru\n");

        t_on_failure("INVITE_FAILURE");
        t_on_reply("MANAGE_REPLY");

        route(RELAY);
        exit;
    }

    if (is_method("REGISTER")) {
        sl_send_reply("403", "Forbidden");
        exit;
    }

    route(RELAY);
}


route[AUTH] {
    if (!pv_auth_check("__AUTH_REALM__", "__AUTH_PASSWORD__", 0, 0)) {
        auth_challenge("__AUTH_REALM__", 1);
        xlog("L_WARN", "[$ci] Auth challenged/failed from $si:$sp (user=$au)\n");
        exit;
    }
    if ($au != "__AUTH_USER__") {
        xlog("L_WARN", "[$ci] Auth rejected: wrong username '$au' from $si:$sp\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }
    xlog("L_INFO", "[$ci] Auth OK for user $au from $si:$sp\n");
    consume_credentials();
}


route[RELAY] {
    if ($avp(zd_ticket) != $null) {
        if (!is_present_hf("X-Zendesk-Ticket-Id")) {
            append_hf("X-Zendesk-Ticket-Id: $avp(zd_ticket)\r\n");
        }
    }
    if (!t_relay()) {
        xlog("L_ERR", "[$ci] Relay failed for $rm\n");
        sl_reply_error();
    }
}

route[RTPMANAGE] {
    if (has_body("application/sdp")) {
        rtpengine_manage("replace-origin replace-session-connection RTP/AVP");
    }
}

onreply_route[MANAGE_REPLY] {
    xlog("L_INFO", "[$ci] Reply $rs $rr\n");

    if (has_body("application/sdp")) {
        rtpengine_manage("replace-origin replace-session-connection RTP/AVP");
    }
}

failure_route[INVITE_FAILURE] {
    xlog("L_WARN", "[$ci] INVITE failed with $T_reply_code $T_reply_reason\n");

    if (t_is_canceled()) {
        exit;
    }

    rtpengine_delete();
}
